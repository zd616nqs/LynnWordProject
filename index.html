
<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8F9FB;
            color: #1A1A1A;
        }
        .soft-shadow {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04);
        }
        .ticket-cut {
            position: relative;
        }
        .ticket-cut::after {
            content: '';
            position: absolute;
            left: -10px;
            bottom: 40px;
            width: 20px;
            height: 20px;
            background: #F8F9FB;
            border-radius: 50%;
        }
        .ticket-cut::before {
            content: '';
            position: absolute;
            right: -10px;
            bottom: 40px;
            width: 20px;
            height: 20px;
            background: #F8F9FB;
            border-radius: 50%;
        }
        .typewriter-cursor {
            border-right: 2px solid #000;
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
